<div class="container mt-5 category_wrapper">

  <h1 class="premium-title">
    Explore Categories
  </h1>

  <p class="premium-subtitle">
    Discover books across powerful knowledge domains
  </p>

  <div class="categories-premium-grid">

    <div
      class="category-premium-card"
      *ngFor="let category of categories"
      [routerLink]="['/categories', category]"
    >

      <div class="category-avatar">

        {{ category.charAt(0) }}

      </div>

      <div class="category-name">

        {{ category }}

      </div>

    </div>

  </div>

</div>
