<div class="container mt-5 category_wrapper">

  <h4 class="mb-4 text-center-text-class"><strong>{{ categoryName }}</strong> Books</h4>

  <div class="row g-4">

    <div
      class="col-lg-3 col-md-4 col-sm-6"
      *ngFor="let book of categoryBooks"
    >
      <app-book-card [book]="book"></app-book-card>
    </div>

  </div>

  <h4 class="mt-5 mb-4 text-center-text-class category_wrapper">
    Books from other categories
  </h4>

  <div class="row g-4">

    <div
      class="col-lg-3 col-md-4 col-sm-6"
      *ngFor="let book of otherBooks"
    >
      <app-book-card [book]="book"></app-book-card>
    </div>

  </div>

</div>
